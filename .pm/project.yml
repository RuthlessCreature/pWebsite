next_actions:
  - Use the locale JSON dictionaries as the source of truth for future translation or copyediting work
  - Use `deploy.sh` for first deployment and `redeploy.sh` for future in-place pull/build/restart updates on the Ubuntu server
  - Submit the refreshed sitemap and verification tokens in Google Search Console, Bing Webmaster Tools, and any region-specific webmaster tools you plan to use after production deployment
  - Add real search-engine verification tokens in production env vars so the generated metadata can expose them automatically
  - Follow `SEO_SOP.md` as the single operating checklist for launch-day SEO, indexing requests, first-month backlink execution, and weekly SEO review
